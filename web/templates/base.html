<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AquaForecast{% endblock %}</title>
    <meta name="description" content="AI-powered Ward-wise Water Scarcity Prediction">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- jsPDF for PDF export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=7">

    {% block head %}{% endblock %}
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar">
        <a href="/" class="nav-brand">💧 AquaForecast</a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/input">Predict</a>
            <a href="/methodology">How It Works</a>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        &copy; 2026 Water Scarcity Prediction System | Chennai
    </footer>

    <div id="toast" class="toast"></div>

    <script src="{{ url_for('static', filename='js/script.js') }}?v=6"></script>
    {% block scripts %}{% endblock %}
</body>

</html>
